name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile || bun install

      - name: Build web bundle
        run: bun run build

      # TanStack Start emits to .output/public; Capacitor expects `dist`.
      - name: Prepare web assets for Capacitor
        run: |
          if [ ! -d dist ] || [ -z "$(ls -A dist 2>/dev/null)" ]; then
            mkdir -p dist
            if [ -d .output/public ]; then
              cp -r .output/public/. dist/
            elif [ -d build/client ]; then
              cp -r build/client/. dist/
            fi
          fi
          # Ensure an index.html exists at dist root
          if [ ! -f dist/index.html ]; then
            echo "ERROR: dist/index.html missing after build" >&2
            find .output build dist -maxdepth 3 -type f 2>/dev/null | head -50
            exit 1
          fi

      - name: Add Android platform (if missing)
        run: |
          if [ ! -d android ]; then
            bunx cap add android
          fi

      - name: Capacitor sync
        run: bunx cap sync android

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant gradlew permissions
        working-directory: android
        run: chmod +x ./gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: |
          mkdir -p artifacts
          cp android/app/build/outputs/apk/debug/app-debug.apk artifacts/smart-files-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: smart-files-debug-apk
          path: artifacts/smart-files-debug.apk
          if-no-files-found: error

      - name: Create GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/smart-files-debug.apk
